<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Routing Dashboard</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-2">Flight Routing Dashboard</h1>
            <p class="text-secondary mb-4">Select your route and optimization mode.</p>

            <form method="post" action="/search" class="row g-3">
              <div class="col-12 col-md-6">
                <label for="src" class="form-label">From</label>
                <select id="src" name="src" class="form-select" required>
                  {% for code, name in airports.items() %}
                    <option value="{{ code }}">{{ code }} - {{ name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-12 col-md-6">
                <label for="dst" class="form-label">To</label>
                <select id="dst" name="dst" class="form-select" required>
                  {% for code, name in airports.items() %}
                    <option value="{{ code }}">{{ code }} - {{ name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-12">
                <fieldset>
                  <legend class="col-form-label pt-0 mb-2">Optimization Mode</legend>

                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="mode-distance" value="distance" checked>
                    <label class="form-check-label" for="mode-distance">Shortest distance</label>
                  </div>

                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="mode-price" value="price">
                    <label class="form-check-label" for="mode-price">Cheapest price</label>
                  </div>

                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="mode-stops" value="stops">
                    <label class="form-check-label" for="mode-stops">Fewest stops</label>
                  </div>
                </fieldset>
              </div>

              <div class="col-12 d-grid d-sm-flex justify-content-sm-end">
                <button type="submit" class="btn btn-primary px-4">Find Route</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
